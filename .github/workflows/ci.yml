name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        working-directory: frontend
        run: |
          npm ci
      - name: Build frontend
        working-directory: frontend
        run: |
          npm run build

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run quick syntax check
        working-directory: backend
        run: |
          python -m py_compile app/main.py app/core/config.py app/core/security.py app/db/session.py app/db/base.py app/api/auth.py app/api/ai.py app/api/fraud.py app/api/analytics.py app/api/emergency.py app/services/auth_service.py app/services/ai_service.py app/services/fraud_service.py
